<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<nav class="navbar navbar-dark bg-primary px-3">
    <img src="assets/img/image.png" alt="Aruba Logo" class="navbar-logo me-2">
    <span class="navbar-brand">Aruba Network</span>

    <div class="form-check form-switch text-white">
        <input class="form-check-input" type="checkbox" id="darkModeToggle">
        <label class="ms-1" for="darkModeToggle">🌙</label>
    </div>
</nav>

<div class="container d-flex justify-content-center align-items-center mt-5">
    <div class="card p-4 shadow-lg login-card">
        <h3 class="text-center mb-3">Login</h3>

        <form id="loginForm">
            <div class="mb-3">
                <label>Email</label>
                <input type="email" id="loginEmail" class="form-control" placeholder="Enter email">
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input type="password" id="loginPassword" class="form-control" placeholder="Enter password">
            </div>

            <button type="submit" class="btn btn-primary w-100">Login</button>

            <p class="text-center mt-3">
                Don't have an account? <a href="signup.html">Signup</a>
            </p>
        </form>
    </div>
</div>

<script src="assets/js/script.js"></script>
</body>
</html>
